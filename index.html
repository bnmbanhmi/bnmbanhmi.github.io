<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bnmbanhmi</title>
    <style>
        :root {
            --bg-color: #FDF6F0;
            --accent-color: #FF7A5C;
            --card-top: #FF9A85;
            --card-bottom-strip: #FF9A85;
            --card-body: #FFF1E6;
            --text-color: #7A6863;
            --muted-color: #BFAAA5;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
        }

        .hello-card {
            width: 300px;
            background-color: var(--card-body);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(122, 104, 99, 0.1);
            margin-bottom: 40px;
            cursor: pointer;
        }

        .card-top {
            background-color: var(--card-top);
            color: #fff;
            text-align: center;
            padding: 14px 0 10px 0;
        }

        .card-top .hello-text {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: block;
            line-height: 1.2;
        }

        .card-top .subtitle-text {
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            display: block;
            margin-top: 2px;
            opacity: 0.9;
        }

        .card-body {
            padding: 18px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80px;
            background-color: var(--card-body);
        }

        .card-bottom-strip {
            background-color: var(--card-bottom-strip);
            height: 22px;
        }

        .handwriting-svg {
            width: 200px;
            height: auto;
        }

        .name-path {
            fill: none;
            stroke: var(--accent-color);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .main-link {
            display: inline-block;
            color: var(--text-color);
            text-decoration: none;
            font-size: 1rem;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 2px;
            transition: all 0.3s ease;
            margin-bottom: 50px;
        }

        .main-link:hover {
            color: var(--accent-color);
            border-bottom-width: 2px;
        }

        .feed-section {
            width: 100%;
            max-width: 400px;
            text-align: left;
        }

        .post-item {
            margin-bottom: 20px;
        }

        .post-item h3 {
            margin: 0 0 4px 0;
            font-weight: 400;
            font-size: 0.95rem;
        }

        .post-item h3 a {
            color: var(--text-color);
            text-decoration: none;
            transition: color 0.2s;
        }

        .post-item h3 a:hover {
            color: var(--accent-color);
        }

        .date {
            font-size: 0.75rem;
            color: var(--muted-color);
            display: block;
        }

        .loading {
            color: var(--muted-color);
            font-style: italic;
            font-size: 0.85rem;
            text-align: center;
        }

        .vinyl-active-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            margin-bottom: 40px;
        }

        .player-title {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--accent-color);
            margin-bottom: 25px;
            opacity: 0.9;
        }

        .vinyl-spin-container {
            position: relative;
            width: 320px;
            height: 320px;
        }

        .vinyl-card-spinning {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 4px 25px rgba(122, 104, 99, 0.3), inset 0 0 0 6px #111;
            animation: spinRecord 15s linear infinite;
            animation-play-state: paused;
            position: relative;
            background-color: #222;
        }

        /* Background ambient colored track wrapper safely preserves styles after iframe injection */
        #active-embed-bg-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(2.5);
            filter: blur(25px) saturate(1.5) brightness(0.8);
            opacity: 0.9;
            pointer-events: none;
            width: 300px;
            height: 352px;
        }

        /* Scaled down foreground wrapper ensures the track and its buttons fully fit inside the vinyl circle */
        #active-embed-fg-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.65);
            z-index: 5;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9);
            border-radius: 20px;
            /* Maps properly over Spotify's natural corners during scaling */
            overflow: hidden;
            width: 300px;
            height: 352px;
            pointer-events: auto;
        }

        /* Spotify API converts the inner div directly to an iframe; these selectors target them directly */
        #active-embed-bg-wrapper iframe,
        #active-embed-fg-wrapper iframe {
            width: 300px !important;
            height: 352px !important;
            border-radius: 0 !important;
            border: none;
        }

        #active-embed-bg-wrapper iframe {
            pointer-events: none;
        }

        @keyframes spinRecord {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .idle-tracks-scroll {
            width: 100%;
            max-width: 400px;
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 10px 5px 20px 5px;
            scrollbar-width: none;
            margin-bottom: 40px;
        }

        .idle-tracks-scroll::-webkit-scrollbar {
            display: none;
        }

        .idle-track {
            position: relative;
            flex: 0 0 auto;
            width: 280px;
            height: 352px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(122, 104, 99, 0.15);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            overflow: hidden;
            background-color: var(--card-body);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .idle-track:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(122, 104, 99, 0.25);
        }

        .idle-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 10;
            background: transparent;
        }
    </style>
</head>

<body>

    <div class="hello-card" id="helloCard">
        <div class="card-top">
            <span class="hello-text">Hello</span>
            <span class="subtitle-text">my name is</span>
        </div>
        <div class="card-body">
            <svg class="handwriting-svg" viewBox="0 0 220 70" xmlns="http://www.w3.org/2000/svg">
                <g transform="translate(31, 0)">
                    <!-- b: stroke 1 = vertical, stroke 2 = belly -->
                    <path class="name-path" id="b-1" d="M12,12 L12,58" />
                    <path class="name-path" id="b-2"
                        d="M12,35 C12,28 22,22 26,30 C30,38 28,48 22,52 C16,56 12,52 12,48" />
                    <!-- a: stroke 1 = circle, stroke 2 = tail -->
                    <path class="name-path" id="a-1"
                        d="M48,32 C44,28 36,28 34,35 C32,42 34,52 40,54 C46,56 50,50 48,42 L48,32" />
                    <path class="name-path" id="a-2" d="M48,32 L48,56" />
                    <!-- n: stroke 1 = vertical, stroke 2 = hump -->
                    <path class="name-path" id="n-1" d="M58,32 L58,56" />
                    <path class="name-path" id="n-2" d="M58,38 C58,30 66,28 70,34 C74,40 72,56 72,56" />
                    <!-- h: stroke 1 = tall vertical, stroke 2 = hump -->
                    <path class="name-path" id="h-1" d="M82,12 L82,56" />
                    <path class="name-path" id="h-2" d="M82,38 C82,30 90,28 94,34 C98,40 96,56 96,56" />
                    <!-- m: stroke 1 = vertical, stroke 2 = first hump, stroke 3 = second hump -->
                    <path class="name-path" id="m-1" d="M106,32 L106,56" />
                    <path class="name-path" id="m-2" d="M106,38 C106,30 114,28 116,34 C118,40 118,42 118,42" />
                    <path class="name-path" id="m-3" d="M118,42 C118,34 120,28 126,28 C132,28 134,36 134,42 L134,56" />
                    <!-- i: stroke 1 = body, stroke 2 = dot -->
                    <path class="name-path" id="i-1" d="M144,32 L144,56" />
                    <path class="name-path" id="i-2" d="M144,22 L144.5,22.5" />
                </g>
            </svg>
        </div>
        <div class="card-bottom-strip"></div>
    </div>

    <a href="https://bnmbanhmi.substack.com" target="_blank" class="main-link">read my essays</a>

    <div class="feed-section">
        <div id="substack-feed" class="loading">...</div>
    </div>

    <!-- Top Active Player -->
    <div class="vinyl-active-wrapper" id="active-player-wrapper">
        <span class="player-title">now playing</span>
        <div class="vinyl-spin-container">
            <div class="vinyl-card-spinning" id="vinyl-animator">
                <!-- Background ambient layer to bleed album art to the vinyl edge -->
                <div id="active-embed-bg-wrapper">
                    <div id="active-embed-bg"></div>
                </div>
                <!-- Foreground fully visible song card safely embedded -->
                <div id="active-embed-fg-wrapper">
                    <div id="active-embed-fg"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Idle Scrollable List -->
    <div class="idle-tracks-scroll" id="idle-tracks"></div>

    <script>
        // ── Handwriting animation ──
        (function () {
            // Each stroke as a separate path, in drawing order
            const strokes = [
                'b-1', 'b-2',       // b: vertical, then belly
                'a-1', 'a-2',       // a: circle, then tail
                'n-1', 'n-2',       // n: vertical, then hump
                'h-1', 'h-2',       // h: vertical, then hump
                'm-1', 'm-2', 'm-3', // m: vertical, first hump, second hump
                'i-1', 'i-2'        // i: body, then dot
            ];

            // Duration each stroke takes to draw (ms)
            const drawDuration = 1000;
            // Small pause between strokes (ms)
            const strokeGap = 40;

            function initPaths() {
                strokes.forEach(id => {
                    const path = document.getElementById(id);
                    const len = path.getTotalLength();
                    path.style.strokeDasharray = len;
                    path.style.strokeDashoffset = len;
                    path.style.transition = 'none';
                });
            }

            // Track pending timers so we can cancel them on re-trigger
            let pendingTimers = [];

            function animateWrite() {
                // Cancel any in-progress animation
                pendingTimers.forEach(t => clearTimeout(t));
                pendingTimers = [];

                // Reset all strokes instantly
                strokes.forEach(id => {
                    const path = document.getElementById(id);
                    const len = path.getTotalLength();
                    path.style.transition = 'none';
                    path.style.strokeDashoffset = len;
                });

                // Force reflow
                void document.querySelector('.handwriting-svg').getBoundingClientRect();

                // Sequentially animate each stroke
                let cumDelay = 0;
                strokes.forEach((id, i) => {
                    const path = document.getElementById(id);
                    const len = path.getTotalLength();
                    // Scale duration proportionally to path length so short strokes don't drag
                    const dur = Math.max(150, drawDuration * (len / 80));

                    const timer = setTimeout(() => {
                        path.style.transition = `stroke-dashoffset ${dur}ms cubic-bezier(0.4, 0, 0.2, 1)`;
                        path.style.strokeDashoffset = '0';
                    }, cumDelay);

                    pendingTimers.push(timer);
                    cumDelay += dur + strokeGap;
                });
            }

            // Initial setup & first animation
            window.addEventListener('DOMContentLoaded', () => {
                initPaths();
                // Small delay so the page settles
                setTimeout(animateWrite, 300);
            });

            // Re-play animation on hover (desktop) and touch/click (mobile)
            const card = document.getElementById('helloCard');
            card.addEventListener('mouseenter', animateWrite);
            card.addEventListener('click', animateWrite);
            card.addEventListener('touchstart', (e) => {
                e.preventDefault();
                animateWrite();
            }, { passive: false });
        })();

        // ── Substack feed ──
        const rssUrl = 'https://bnmbanhmi.substack.com/feed';
        const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`;

        fetch(apiUrl)
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('substack-feed');
                container.innerHTML = '';

                if (!data.items || data.items.length === 0) {
                    container.innerHTML = '<p class="loading">nothing yet.</p>';
                    return;
                }

                const posts = data.items.slice(0, 3);

                posts.forEach(post => {
                    let dateObj = new Date(post.pubDate.replace(/-/g, '/'));
                    let pubDate = dateObj.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit' });

                    container.innerHTML += `
                        <div class="post-item">
                            <h3><a href="${post.link}" target="_blank">${post.title.toLowerCase()}</a></h3>
                            <span class="date">${pubDate}</span>
                        </div>
                    `;
                });
            })
            .catch(error => {
                document.getElementById('substack-feed').innerHTML = '';
            });

        // ── Spotify Vinyl Player (Swap Mechanism) ──
        // You can put either direct IDs or full Spotify URLs here!
        const trackInputs = [
            'https://open.spotify.com/track/4clakrnFWRZ1FiiX3LJxg6?si=fbb79b2f146e47fb', // 
            'https://open.spotify.com/track/317Lh6QCAz9JpWbV3oxrCf?si=8a7fae6e67d54162', // 
            'https://open.spotify.com/track/15I2gq8Nill5zwxabTFD6f?si=a8ebd43a2b7c4ce1'
        ];

        function parseSpotifyUri(input) {
            // Extracts the ID after 'track/' if it's a full URL, or just uses it directly
            const match = input.match(/track\/([a-zA-Z0-9]+)/);
            const id = match ? match[1] : input;
            return 'spotify:track:' + id;
        }

        const validUris = trackInputs.map(parseSpotifyUri);
        let activeUri = validUris[0];
        let idleUris = validUris.slice(1);

        let activeController = null;
        let idleControllers = []; // array of { div, controller, uri }

        const spotifyScript = document.createElement('script');
        spotifyScript.src = "https://open.spotify.com/embed/iframe-api/v1";
        spotifyScript.async = true;
        document.body.appendChild(spotifyScript);

        window.onSpotifyIframeApiReady = (IFrameAPI) => {
            const activeEmbedBgDiv = document.getElementById('active-embed-bg');
            const activeEmbedFgDiv = document.getElementById('active-embed-fg');
            const vinylAnimator = document.getElementById('vinyl-animator');
            const idleContainer = document.getElementById('idle-tracks');

            let bgController = null;

            // 1. Initialize Active Track Options
            const activeOptions = {
                uri: activeUri,
                width: '300',
                height: '352',
                theme: '0'
            };

            // Background Ambient Layer
            IFrameAPI.createController(activeEmbedBgDiv, activeOptions, (controller) => {
                bgController = controller;
            });

            // Foreground Interactive Layer
            IFrameAPI.createController(activeEmbedFgDiv, activeOptions, (controller) => {
                activeController = controller;

                controller.addListener('playback_update', e => {
                    // Play/Pause spinner based on track state
                    if (!e.data.isPaused && !e.data.isBuffering) {
                        vinylAnimator.style.animationPlayState = 'running';
                    } else {
                        vinylAnimator.style.animationPlayState = 'paused';
                    }
                });
            });

            // 2. Initialize Idle Tracks horizontally (Clean tall square cards)
            idleUris.forEach((uri) => {
                const idleDiv = document.createElement('div');
                idleDiv.className = 'idle-track';

                const iframeDiv = document.createElement('div');
                iframeDiv.style.width = '100%';
                iframeDiv.style.height = '100%';
                idleDiv.appendChild(iframeDiv);

                // Overlay to intercept clicks without hitting Spotify Player
                const overlay = document.createElement('div');
                overlay.className = 'idle-overlay';
                idleDiv.appendChild(overlay);

                idleContainer.appendChild(idleDiv);

                const idleOptions = {
                    uri: uri,
                    width: '280',
                    height: '352',
                    theme: '0'
                };

                IFrameAPI.createController(iframeDiv, idleOptions, (controller) => {
                    const idleObj = {
                        div: idleDiv,
                        controller: controller,
                        uri: uri
                    };
                    idleControllers.push(idleObj);

                    idleDiv.addEventListener('click', () => {
                        const oldActiveUri = activeUri;
                        const newActiveUri = idleObj.uri;

                        // State sync
                        activeUri = newActiveUri;
                        idleObj.uri = oldActiveUri;

                        // Swap tracks between views
                        activeController.loadUri(newActiveUri);
                        if (bgController) bgController.loadUri(newActiveUri);
                        idleObj.controller.loadUri(oldActiveUri);

                        // Reset spinner dynamically
                        vinylAnimator.style.animationPlayState = 'paused';
                    });
                });
            });
        };
    </script>
</body>

</html>
